[camera_monitor]
	#Maximum camera monitor refresh rate in frames per second.
	#Recommended range: 4-12
	# Default: 8
	# Range: 1 ~ 20
	feed_fps = 8
	#Camera monitor render resolution. Supported values: 64, 96, 128, 192, 256, 384, 512
	# Default: 512
	# Range: 64 ~ 512
	feed_resolution = 512
	#Camera monitor chunk view distance.
	#Default: 2
	# Default: 2
	# Range: 1 ~ 16
	feed_view_distance = 2
